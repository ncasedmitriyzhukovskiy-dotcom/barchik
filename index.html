<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Колесо выбора</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#1b1f3b,#090b17);
display:flex;
align-items:center;
justify-content:center;
font-family:'Montserrat',sans-serif;
color:white;
overflow-x:hidden;
}

#fireworks{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.app{
text-align:center;
width:100%;
max-width:520px;
padding:20px;
position:relative;
z-index:2;
}

h1{font-size:26px;margin-bottom:20px;}

.mode-btn{
padding:10px 22px;
border:none;
border-radius:40px;
font-weight:800;
cursor:pointer;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
margin-bottom:25px;
}

.wheel-wrapper{
position:relative;
width:90vw;
max-width:460px;
height:90vw;
max-height:460px;
margin:20px auto 10px auto;
}

.pointer{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:24px solid #ff3d3d;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
display:block;
}

.spin-btn{
margin-top:15px;
padding:14px 30px;
font-size:16px;
font-weight:800;
border:none;
border-radius:40px;
cursor:pointer;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
}

.result{
margin-top:18px;
font-size:20px;
min-height:28px;
transition:0.3s;
}

.result.winner{
font-size:26px;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.settings-btn{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:30px;
background:#2b2f55;
color:#fff;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:999;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-content{
background:#11142a;
width:90%;
max-width:400px;
padding:20px;
border-radius:16px;
text-align:left;
}

.section-title{font-size:14px;margin-bottom:6px;opacity:0.7;}

.input-row{
display:flex;
gap:10px;
margin-bottom:15px;
}

.input-row input{
flex:1;
padding:8px;
border-radius:8px;
border:none;
}

.input-row button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff416c;
color:white;
font-weight:600;
}

.list{
max-height:150px;
overflow-y:auto;
margin-bottom:10px;
}

.list-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1c2040;
padding:8px 12px;
border-radius:8px;
margin-bottom:6px;
font-size:14px;
}

.list-item button{
background:#ff4b2b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
padding:4px 8px;
font-size:12px;
}

.close-btn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#2b2f55;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="app">

<h1 id="wheelTitle"></h1>

<button class="mode-btn" id="modeToggle">Режим: На вылет</button>

<div class="wheel-wrapper">
<div class="pointer"></div>
<canvas id="wheel"></canvas>
</div>

<button class="spin-btn" id="spin">ХУЯРИТЬ</button>

<div class="result" id="result"></div>

<button class="settings-btn" onclick="openModal()">⚙ Настроить колесо</button>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2>Настройка</h2>

<div class="section-title">Название</div>
<div class="input-row">
<input id="titleInput">
<button onclick="saveTitle()">Сохранить</button>
</div>

<div class="section-title">Варианты</div>
<div class="input-row">
<input id="newItem">
<button onclick="addItem()">Добавить</button>
</div>

<div class="list" id="list"></div>

<button class="close-btn" onclick="closeModal()">Закрыть</button>
</div>
</div>

<script>

/* ===== ДАННЫЕ ===== */

let bars=JSON.parse(localStorage.getItem("wheel_items"))||[
"Дима","Игорь","Вадим"
];

let savedTitle=localStorage.getItem("wheel_title")||"Колесо выбора";
document.getElementById("wheelTitle").textContent=savedTitle;

let mode="elimination";
let round=1;

/* ===== КОЛЕСО ===== */

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const spinBtn=document.getElementById("spin");
const result=document.getElementById("result");
const modeToggle=document.getElementById("modeToggle");

let size,center,radius;
let rotation=0;
let spinning=false;

function resizeCanvas(){
const rect=canvas.parentElement.getBoundingClientRect();
canvas.width=rect.width;
canvas.height=rect.height;
size=rect.width;
center=size/2;
radius=center-10;
drawWheel();
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function drawWheel(){
ctx.clearRect(0,0,size,size);
if(bars.length===0)return;

const slice=(2*Math.PI)/bars.length;

bars.forEach((bar,i)=>{
const angle=rotation+i*slice;
ctx.beginPath();
ctx.moveTo(center,center);
ctx.arc(center,center,radius,angle,angle+slice);
ctx.fillStyle=`hsl(${(i*360)/bars.length},85%,60%)`;
ctx.fill();

ctx.save();
ctx.translate(center,center);
ctx.rotate(angle+slice/2);
ctx.textAlign="right";
ctx.fillStyle="#000";
ctx.font=`bold ${size*0.05}px Montserrat`;
ctx.fillText(bar,radius-20,6);
ctx.restore();
});
}

function spinWheel(){

if(spinning)return;
if(bars.length===0)return;
if(mode==="elimination" && bars.length===1){
showWinner(bars[0]);
return;
}

spinning=true;
spinBtn.disabled=true;
result.classList.remove("winner");

const slice=(2*Math.PI)/bars.length;
const index=Math.floor(Math.random()*bars.length);
const spins=6;

const targetAngle=(2*Math.PI)-(index*slice+slice/2)-Math.PI/2;
const finalRotation=spins*2*Math.PI+targetAngle;

const start=performance.now();
const duration=4000;

function animate(time){
const progress=Math.min((time-start)/duration,1);
const ease=1-Math.pow(1-progress,4);
rotation=ease*finalRotation;
drawWheel();

if(progress<1){
requestAnimationFrame(animate);
}else{
spinning=false;
handleResult(index);
}
}
requestAnimationFrame(animate);
}

function handleResult(index){

if(mode==="single"){
showWinner(bars[index]);
spinBtn.disabled=false;
return;
}

const eliminated=bars[index];
result.textContent=`❌ ${round} вылетает: ${eliminated}`;

setTimeout(()=>{
bars.splice(index,1);
saveItems();
round++;
rotation=0;
drawWheel();

if(bars.length===1){
showWinner(bars[0]);
}else{
spinBtn.disabled=false;
}
},1500);
}

spinBtn.onclick=spinWheel;

modeToggle.onclick=()=>{
mode=mode==="elimination"?"single":"elimination";
modeToggle.textContent=mode==="elimination"
?"Режим: На вылет"
:"Режим: Один прокрут";
};

/* ===== САЛЮТ ===== */

const fwCanvas=document.getElementById("fireworks");
const fwCtx=fwCanvas.getContext("2d");

function resizeFW(){
fwCanvas.width=window.innerWidth;
fwCanvas.height=window.innerHeight;
}
window.addEventListener("resize",resizeFW);
resizeFW();

let particles=[];

function createFirework(){
const x=Math.random()*fwCanvas.width;
const y=Math.random()*fwCanvas.height/2;
for(let i=0;i<80;i++){
particles.push({
x,y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*4+2,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

function animateFW(){
fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;
fwCtx.fillStyle=p.color;
fwCtx.fillRect(p.x,p.y,3,3);
if(p.life<=0)particles.splice(i,1);
});
requestAnimationFrame(animateFW);
}
animateFW();

function showWinner(name){
result.textContent=`🏆 ПОБЕДИТЕЛЬ: ${name}`;
result.classList.add("winner");
spinBtn.disabled=false;
round=1;
}

/* ===== РЕДАКТОР ===== */

const modal=document.getElementById("modal");

function openModal(){
modal.classList.add("active");
renderList();
document.getElementById("titleInput").value=
document.getElementById("wheelTitle").textContent;
}

function closeModal(){modal.classList.remove("active");}

function saveTitle(){
const value=document.getElementById("titleInput").value.trim();
if(!value)return;
document.getElementById("wheelTitle").textContent=value;
localStorage.setItem("wheel_title",value);
}

function addItem(){
const input=document.getElementById("newItem");
const value=input.value.trim();
if(!value)return;
bars.push(value);
input.value="";
saveItems();
renderList();
drawWheel();
}

function removeItem(i){
bars.splice(i,1);
saveItems();
renderList();
drawWheel();
}

function renderList(){
const list=document.getElementById("list");
list.innerHTML="";
bars.forEach((b,i)=>{
list.innerHTML+=`
<div class="list-item">
<span>${b}</span>
<button onclick="removeItem(${i})">✖</button>
</div>`;
});
}

function saveItems(){
localStorage.setItem("wheel_items",JSON.stringify(bars));
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Колесо выбора</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#1b1f3b,#090b17);
display:flex;
align-items:center;
justify-content:center;
font-family:'Montserrat',sans-serif;
color:white;
}

.app{
text-align:center;
width:100%;
max-width:520px;
padding:20px;
}

h1{
font-size:26px;
margin-bottom:20px;
transition:0.3s;
}

.mode-btn{
padding:10px 22px;
border:none;
border-radius:40px;
font-weight:800;
cursor:pointer;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
margin-bottom:25px;
}

.wheel-wrapper{
position:relative;
width:90vw;
max-width:460px;
height:90vw;
max-height:460px;
margin:20px auto 10px auto;
}

.pointer{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:24px solid #ff3d3d;
z-index:5;
}

canvas{
width:100%;
height:100%;
border-radius:50%;
}

.spin-btn{
margin-top:15px;
padding:14px 30px;
font-size:16px;
font-weight:800;
border:none;
border-radius:40px;
cursor:pointer;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
}

.result{
margin-top:18px;
font-size:18px;
opacity:0;
transition:0.3s;
min-height:24px;
}
.result.show{opacity:1;}

.settings-btn{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:30px;
background:#2b2f55;
color:#fff;
cursor:pointer;
}

/* ===== POPUP ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-content{
background:#11142a;
width:90%;
max-width:400px;
padding:20px;
border-radius:16px;
text-align:left;
}

.modal-content h2{
margin-top:0;
margin-bottom:15px;
text-align:center;
}

.section-title{
font-size:14px;
margin-bottom:6px;
opacity:0.7;
}

.input-row{
display:flex;
gap:10px;
margin-bottom:15px;
}

.input-row input{
flex:1;
padding:8px;
border-radius:8px;
border:none;
}

.input-row button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff416c;
color:white;
font-weight:600;
}

.list{
max-height:150px;
overflow-y:auto;
margin-bottom:10px;
}

.list-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1c2040;
padding:8px 12px;
border-radius:8px;
margin-bottom:6px;
font-size:14px;
}

.list-item button{
background:#ff4b2b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
padding:4px 8px;
font-size:12px;
}

.close-btn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#2b2f55;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div class="app">

<h1 id="wheelTitle">🍹 Куда идём по пивасику пидарасику?</h1>

<button class="mode-btn" id="modeToggle">
Режим: На вылет
</button>

<div class="wheel-wrapper">
<div class="pointer"></div>
<canvas id="wheel"></canvas>
</div>

<button class="spin-btn" id="spin">ХУЯРИТЬ</button>

<div class="result" id="result"></div>

<button class="settings-btn" onclick="openModal()">⚙ Настроить колесо</button>

</div>

<!-- POPUP -->
<div class="modal" id="modal">
<div class="modal-content">
<h2>Настройка колеса</h2>

<div class="section-title">Название колеса</div>
<div class="input-row">
<input id="titleInput" placeholder="Введите название"/>
<button onclick="saveTitle()">Сохранить</button>
</div>

<div class="section-title">Варианты</div>
<div class="input-row">
<input id="newItem" placeholder="Новый вариант"/>
<button onclick="addItem()">Добавить</button>
</div>

<div class="list" id="list"></div>

<button class="close-btn" onclick="closeModal()">Закрыть</button>

</div>
</div>

<script>

// ===== ЗАГРУЗКА ИЗ localStorage =====

let bars = JSON.parse(localStorage.getItem("wheel_items")) || [
"Пивной сад",
"Чили",
"Корвин",
"Солтихорс"
];

let savedTitle = localStorage.getItem("wheel_title") || 
"🍹 Куда идём по пивасику пидарасику?";

document.getElementById("wheelTitle").textContent = savedTitle;

// ===== ОСНОВА =====

let mode="elimination";

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const spinBtn=document.getElementById("spin");
const result=document.getElementById("result");
const modeToggle=document.getElementById("modeToggle");
const modal=document.getElementById("modal");

let size,center,radius;
let rotation=0;
let spinning=false;
let round=1;

const DPR=Math.min(window.devicePixelRatio||1,2);

function resizeCanvas(){
const rect=canvas.parentElement.getBoundingClientRect();
canvas.width=rect.width*DPR;
canvas.height=rect.height*DPR;
canvas.style.width=rect.width+"px";
canvas.style.height=rect.height+"px";
ctx.setTransform(DPR,0,0,DPR,0,0);
size=rect.width;
center=size/2;
radius=center-10;
drawWheel();
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function drawWheel(){
ctx.clearRect(0,0,size,size);
if(!bars.length)return;

const slice=(2*Math.PI)/bars.length;

bars.forEach((bar,i)=>{
const angle=rotation+i*slice;

ctx.beginPath();
ctx.moveTo(center,center);
ctx.arc(center,center,radius,angle,angle+slice);
ctx.fillStyle=`hsl(${(i*360)/bars.length},85%,60%)`;
ctx.fill();

ctx.save();
ctx.translate(center,center);
ctx.rotate(angle+slice/2);
ctx.textAlign="right";
ctx.fillStyle="#000";
ctx.font=`bold ${size*0.04}px Montserrat`;
ctx.fillText(bar,radius-18,6);
ctx.restore();
});
}

function spinWheel(){
if(spinning||bars.length<1)return;
spinning=true;
spinBtn.disabled=true;
result.classList.remove("show");

const slice=(2*Math.PI)/bars.length;
const index=Math.floor(Math.random()*bars.length);
const spins=6;

const targetAngle=(2*Math.PI)-(index*slice+slice/2)-Math.PI/2;
const finalRotation=spins*2*Math.PI+targetAngle;

const start=performance.now();
const duration=4000;

function animate(time){
const progress=Math.min((time-start)/duration,1);
const ease=1-Math.pow(1-progress,4);
rotation=ease*finalRotation;
drawWheel();

if(progress<1){
requestAnimationFrame(animate);
}else{
spinning=false;
handleResult(index);
}
}
requestAnimationFrame(animate);
}

function handleResult(index){

if(mode==="single"){
result.textContent=`🏆 Победитель: ${bars[index]}`;
result.classList.add("show");
spinBtn.disabled=false;
return;
}

const eliminated=bars[index];
result.textContent=`❌ ${round} вылетает: ${eliminated}`;
result.classList.add("show");

setTimeout(()=>{
bars.splice(index,1);
saveItems();
round++;
rotation=0;
drawWheel();

if(bars.length===1){
result.textContent=`🏆 ПОБЕДИТЕЛЬ: ${bars[0]}`;
}else{
spinBtn.disabled=false;
}
},1500);
}

modeToggle.onclick=()=>{
mode=mode==="elimination"?"single":"elimination";
modeToggle.textContent=mode==="elimination"
?"Режим: На вылет"
:"Режим: Один прокрут";
};

spinBtn.onclick=spinWheel;

// ===== НАСТРОЙКИ =====

function openModal(){
modal.classList.add("active");
renderList();
document.getElementById("titleInput").value =
document.getElementById("wheelTitle").textContent;
}

function closeModal(){
modal.classList.remove("active");
}

function saveTitle(){
const value=document.getElementById("titleInput").value.trim();
if(!value)return;
document.getElementById("wheelTitle").textContent=value;
localStorage.setItem("wheel_title",value);
}

function addItem(){
const input=document.getElementById("newItem");
const value=input.value.trim();
if(!value)return;
bars.push(value);
input.value="";
saveItems();
renderList();
drawWheel();
}

function removeItem(i){
bars.splice(i,1);
saveItems();
renderList();
drawWheel();
}

function renderList(){
const list=document.getElementById("list");
list.innerHTML="";
bars.forEach((b,i)=>{
list.innerHTML+=`
<div class="list-item">
<span>${b}</span>
<button onclick="removeItem(${i})">✖</button>
</div>`;
});
}

function saveItems(){
localStorage.setItem("wheel_items",JSON.stringify(bars));
}

</script>

</body>
</html>

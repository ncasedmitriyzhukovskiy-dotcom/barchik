<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Куда идём по пивасику пидарасику?</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1b1f3b, #090b17);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    color: white;
    overflow: hidden;
}

.app {
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    font-size: 34px;
}

.wheel-wrapper {
    position: relative;
    width: 460px;
    height: 460px;
    margin: auto;
}

canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 32px solid #ff3d3d;
    filter: drop-shadow(0 0 6px rgba(255,0,0,0.7));
}

button {
    margin-top: 30px;
    padding: 16px 46px;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    border-radius: 50px;
    color: white;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(255,75,43,0.45);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.result {
    margin-top: 26px;
    font-size: 24px;
    opacity: 0;
    transition: 0.4s;
}

.result.show {
    opacity: 1;
}
</style>
</head>

<body>
<div class="app">
    <h1>🍹 Куда идём по пивасику пидарасику?</h1>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel" width="460" height="460"></canvas>
    </div>

    <button id="spin">ХУЯРИТЬ</button>

    <div class="result" id="result"></div>
</div>

<script>
// ================= НАСТРОЙКИ =================
let bars = [
    "Пивной сад",
    "Чили(нергрони)",
    "Корвин",
    "Солтихорс",
    "Качка",
    "Гамбринус",
    "У Димы на хате",
    "У Игоря на хате",
    "У Вадика на хате"
];

// ============================================

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spin");
const result = document.getElementById("result");

const size = canvas.width;
const center = size / 2;
const radius = center - 10;

let rotation = 0;
let spinning = false;
let round = 1;
let lastTick = -1;

let seed = Math.floor(Math.random() * 1e9);

const tickSound = new Audio(
  "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);
tickSound.volume = 0.4;

// ====== RANDOM SEED ======
function seededRandom() {
    const x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
}

// ====== ОТРИСОВКА ======
function drawWheel() {
    ctx.clearRect(0, 0, size, size);

    if (bars.length === 0) return;

    const slice = (2 * Math.PI) / bars.length;

    bars.forEach((bar, i) => {
        const angle = rotation + i * slice;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + slice);

        ctx.fillStyle = `hsl(${(i * 360) / bars.length}, 85%, 60%)`;
        ctx.fill();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(angle + slice / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "bold 15px Montserrat";
        ctx.fillText(bar, radius - 18, 6);
        ctx.restore();
    });
}

drawWheel();

// ====== ВРАЩЕНИЕ ======
spinBtn.addEventListener("click", () => {
    if (spinning || bars.length <= 1) return;

    spinning = true;
    spinBtn.disabled = true;
    result.classList.remove("show");

    const slice = (2 * Math.PI) / bars.length;
    const loserIndex = Math.floor(seededRandom() * bars.length);
    const spins = 6;

    const targetAngle =
        (2 * Math.PI) -
        (loserIndex * slice + slice / 2) -
        Math.PI / 2;

    const finalRotation =
        spins * 2 * Math.PI + targetAngle;

    const start = performance.now();
    const duration = 5000;

    function animate(time) {
        const progress = Math.min((time - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 5);

        rotation = ease * finalRotation;
        drawWheel();

        const currentTick = Math.floor(
            ((rotation % (2 * Math.PI)) + 2 * Math.PI) / slice
        );

        if (currentTick !== lastTick) {
            tickSound.currentTime = 0;
            tickSound.play();
            lastTick = currentTick;
        }

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            lastTick = -1;
            showResult(loserIndex);
        }
    }

    requestAnimationFrame(animate);
});

// ====== РЕЗУЛЬТАТ + ВЫБЫВАНИЕ ======
function showResult(index) {

    const eliminated = bars[index];

    result.textContent =
        bars.length > 1
        ? `❌ Раунд ${round}: идет нахуй: ${eliminated}`
        : `🏆 ПОБЕДИТЕЛЬ АХУЕТЬ: ${eliminated}`;

    result.classList.add("show");

    if (bars.length > 1) {

        setTimeout(() => {

            // удаляем выбывший бар
            bars.splice(index, 1);

            // ЕСЛИ ОСТАЛСЯ 1 — запускаем финальное вращение
            if (bars.length === 1) {
                finalSpin();
                return;
            }

            round++;
            rotation = 0;
            spinBtn.disabled = false;
            drawWheel();

        }, 2000);

    } else {
        finalWinAnimation();
    }
}

// ====== ФИНАЛЬНОЕ КРУТЕЙШЕЕ ВРАЩЕНИЕ ======
function finalSpin() {

    result.textContent = "🔥 ФИНАЛЬНОЕ ВРАЩЕНИЕ АХАХАХЭА!";
    result.classList.add("show");

    const slice = (2 * Math.PI) / bars.length;
    const spins = 8;

    const targetAngle =
        (2 * Math.PI) -
        (slice / 2) -
        Math.PI / 2;

    const finalRotation =
        spins * 2 * Math.PI + targetAngle;

    const start = performance.now();
    const duration = 4000;

    function animate(time) {

        const progress = Math.min((time - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 4);

        rotation = ease * finalRotation;
        drawWheel();

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            finalWinAnimation();
        }
    }

    requestAnimationFrame(animate);
}


// ====== ФИНАЛ ======
function finalWinAnimation() {

    result.textContent = `🏆 БЛЯДСКИЙ ПОБЕДИТЕЛЬ ГОВНА: ${bars[0]} 🍾`;
    result.style.fontSize = "34px";
    result.style.textShadow = "0 0 25px gold";
    result.classList.add("show");

    confetti();
}

// ====== CONFETTI ======
function confetti() {
    for (let i = 0; i < 120; i++) {
        const el = document.createElement("div");
        el.style.position = "fixed";
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = "-10px";
        el.style.width = "8px";
        el.style.height = "8px";
        el.style.background = `hsl(${Math.random() * 360},100%,50%)`;
        el.style.borderRadius = "50%";
        el.style.zIndex = 9999;
        el.style.animation = "fall 3s linear";

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
    }
}`;
document.head.appendChild(style);

</script>
</body>
</html>

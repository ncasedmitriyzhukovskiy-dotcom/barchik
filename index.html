<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Куда идём по пивасику пидарасику?</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1b1f3b, #090b17);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    color: white;
    overflow-x: hidden;
}

.app {
    text-align: center;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
}

h1 { font-size: 28px; }

.wheel-wrapper {
    position: relative;
    width: 460px;
    height: 460px;
    max-width: 90vw;
    max-height: 90vw;
    margin: auto;
}

canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.pointer {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 28px solid #ff3d3d;
}

button {
    margin-top: 30px;
    padding: 14px 36px;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    border-radius: 50px;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    opacity: 0;
    transition: 0.3s;
}

.result.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
    <h1>🍹 Куда идём по пивасику пидарасику?</h1>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>

    <button id="spin">ХУЯРИТЬ</button>
    <div id="result" class="result"></div>
</div>

<script>

// ===== НАСТРОЙКИ =====
let bars = [
    "Пивной сад",
    "Чили(нергрони)",
    "Корвин",
    "Солтихорс",
    "Качка",
    "Гамбринус"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spin");
const result = document.getElementById("result");

let size, center, radius;
let rotation = 0;
let spinning = false;
let round = 1;
let lastTick = -1;

// 🔥 ограничиваем DPR до 2 (Safari не будет перегружаться)
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();

    canvas.width = rect.width * DPR;
    canvas.height = rect.height * DPR;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    size = rect.width;
    center = size / 2;
    radius = center - 10;

    drawWheel();
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ===== ЗВУК =====
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

const tickSound = new Audio(
  "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);
tickSound.volume = 0.4;

// ===== ОТРИСОВКА =====
function drawWheel() {
    ctx.clearRect(0, 0, size, size);

    const slice = (2 * Math.PI) / bars.length;

    for (let i = 0; i < bars.length; i++) {

        const angle = rotation + i * slice;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + slice);
        ctx.fillStyle = `hsl(${(i * 360) / bars.length},85%,60%)`;
        ctx.fill();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(angle + slice / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = `bold ${size * 0.035}px Montserrat`;
        ctx.fillText(bars[i], radius - 18, 6);
        ctx.restore();
    }
}

// ===== ВРАЩЕНИЕ =====
spinBtn.addEventListener("click", () => {
    if (spinning || bars.length <= 1) return;

    spinning = true;
    spinBtn.disabled = true;
    result.classList.remove("show");

    const slice = (2 * Math.PI) / bars.length;
    const loserIndex = Math.floor(Math.random() * bars.length);
    const spins = 6;

    const targetAngle =
        (2 * Math.PI) -
        (loserIndex * slice + slice / 2) -
        Math.PI / 2;

    const finalRotation = spins * 2 * Math.PI + targetAngle;

    const start = performance.now();
    const duration = 5000;

    function animate(time) {
        const progress = Math.min((time - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 5);

        rotation = ease * finalRotation;
        drawWheel();

        const currentTick = Math.floor(rotation / slice);

        // 🔥 отключаем тики на мобилке (это главный лаг)
        if (!isMobile && currentTick !== lastTick) {
            tickSound.currentTime = 0;
            tickSound.play().catch(()=>{});
            lastTick = currentTick;
        }

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            lastTick = -1;
            showResult(loserIndex);
        }
    }

    requestAnimationFrame(animate);
});

// ===== РЕЗУЛЬТАТ =====
function showResult(index) {

    const eliminated = bars[index];

    result.textContent =
        bars.length > 1
        ? `❌ ${round}й идет нахуй: ${eliminated}`
        : `🏆 ПОБЕДИТЕЛЬ АХУЕТЬ: ${eliminated}`;

    result.classList.add("show");

    if (bars.length > 1) {
        setTimeout(() => {
            bars.splice(index, 1);
            round++;
            rotation = 0;
            spinBtn.disabled = false;
            drawWheel();
        }, 2000);
    }
}

</script>
</body>
</html>
